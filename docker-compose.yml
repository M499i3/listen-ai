services:
  stat:
    image: listenai-stat:latest
    container_name: listenai-stat
    environment:
      STAT_PORT: "8002"
      SQLITE_PATH: /data/listenai.db
    volumes:
      - listenai_data:/data
    ports:
      - "8002:8002"

  nlp:
    image: listenai-nlp:latest
    container_name: listenai-nlp
    environment:
      NLP_PORT: "8001"
    ports:
      - "8001:8001"

  gateway:
    image: listenai-gateway:latest
    container_name: listenai-gateway
    environment:
      GATEWAY_PORT: "8000"
      STAT_URL: http://stat:8002
      NLP_URL: http://nlp:8001
      JWT_SECRET: supersecret
      DEMO_USER: admin
      DEMO_PASS: admin123
    depends_on:
      - stat
      - nlp
    ports:
      - "8000:8000"

  frontend:
    image: listenai-frontend:latest
    container_name: listenai-frontend
    environment:
      GATEWAY_URL: http://gateway:8000
    depends_on:
      - gateway
    ports:
      - "8501:8501"

volumes:
  listenai_data: